<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | White Water Rafting Company</title>
    <meta name="description"
      content="Contact White Water Rafting Company in Kolob, California for reservations, trip questions, and general inquiries.">
    <meta name="author" content="Okoro Ikechi Emmanuel" />
    <link rel="stylesheet" href="styles/rafting.css" />
</head>

<body>

    <!-- HEADER -->
    <header>
        <img src="images/logo-bluein.jpg" alt="BlueIn Rafting Logo" />
        <nav aria-label="Main navigation">
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html" aria-current="page">Contact Us</a></li>
            </ul>
        </nav>
    </header>

    <!-- MAIN -->
    <main>

        <!-- CONTACT INFO -->
        <section class="contact-info">
            <h1>White Water Rafting Company</h1>

            <address>
                123 Main River Street<br>
                Kolob, California<br>
                <a href="tel:+18015551234">(801) 555-1234</a><br>
                <a href="mailto:info@whitewaterrafting.com">
                    info@whitewaterrafting.com
                </a>
            </address>
        </section>

        <!-- MAP + FORM -->
        <div class="contact-layout">

            <!-- MAP -->
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.0!2d-113.0!3d37.3!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzfCsDE4JzAwLjAiTiAxMTPCsDAwJzAwLjAiVw!5e0!3m2!1sen!2sus!4v0"
                  title="Map showing White Water Rafting Company location in Kolob, California"
                  loading="lazy" allowfullscreen referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>

            <!-- CONTACT FORM -->
            <form class="contact-form" action="#" method="post">

                <!-- Name -->
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your full name" required
                  autocomplete="name" />

                <!-- Email -->
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="you@example.com" required
                  autocomplete="email" />

                <!-- Message Purpose -->
                <fieldset>
                    <legend>Message Purpose</legend>

                    <input type="radio" id="purpose-general" name="purpose" value="general-inquiry"
                      required>
                    <label for="purpose-general">General Inquiry</label>

                    <br>

                    <input type="radio" id="purpose-reservation" name="purpose"
                      value="reservation-question">
                    <label for="purpose-reservation">Reservation Question</label>

                    <br>

                    <input type="radio" id="purpose-suggestion" name="purpose"
                      value="website-suggestion">
                    <label for="purpose-suggestion">Website Suggestion</label>
                </fieldset>

                <!-- Message -->
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Type here"
                  required></textarea>

                <!-- Newsletter -->
                <label class="subscribe">
                    <input type="checkbox" id="newsletter" name="newsletter" value="yes" />
                    Please subscribe me to the monthly newsletter
                </label>

                <!-- Submit -->
                <button type="submit">Get in Touch!</button>

            </form>

        </div>

        <!-- EMPLOYEE PROFILES -->
        <section class="employees" aria-labelledby="team-heading">
            <h2 id="team-heading">We Are Here to Serve You</h2>
            <div class="employee-grid">

                <figure>
                    <img src="images/jordan.jpg" alt="Jordan Mitchell, Head River Guide" />
                    <figcaption>
                        Jordan Mitchell<br>
                        <span>Head River Guide</span>
                    </figcaption>
                </figure>

                <figure>
                    <img src="images/samantha.jpg" alt="Samantha Reyes, Reservations Manager" />
                    <figcaption>
                        Samantha Reyes<br>
                        <span>Reservations Manager</span>
                    </figcaption>
                </figure>

                <figure>
                    <img src="images/derek.jpg" alt="Derek Owens, Safety and Training Officer" />
                    <figcaption>
                        Derek Owens<br>
                        <span>Safety &amp; Training Officer</span>
                    </figcaption>
                </figure>

            </div>
        </section>

    </main>

    <!-- FOOTER -->
    <footer>
        <p>©️2026 BlueIn Rafting Okoro Ikechi Emmanuel</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook_220200.png" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin_3991775.png" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/social_15707749.png" alt="Instagram Icon">
            </a>
        </nav>
    </footer>

</body>

</html>
