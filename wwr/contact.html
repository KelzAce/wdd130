<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact White Water Rafting Company">
    <title>Contact Us | White Water Rafting</title>
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>

    <!-- HEADER (reuse across all pages) -->
    <header class="site-header">
        <div class="logo">
            <img src="images/logo.png" alt="White Water Rafting Logo">
        </div>

        <nav class="main-nav">
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html" class="active">Contact Us</a>
        </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main>

        <!-- COMPANY INFO -->
        <section class="contact-info">
            <h1>White Water Rafting Company</h1>
            <p>123 Main River Street</p>
            <p>Kolob, California</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <!-- MAP + FORM LAYOUT WRAPPER -->
        <section class="contact-layout">

            <!-- GOOGLE MAP -->
            <div class="map">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!..." width="100%"
                  height="300" loading="lazy">
                </iframe>
            </div>

            <!-- CONTACT FORM -->
            <form class="contact-form">

                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your email" required>

                <fieldset>
                    <legend>Message Purpose</legend>

                    <label>
                        <input type="radio" name="purpose" value="general" required>
                        General Inquiry
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="reservation">
                        Reservation Question
                    </label>

                    <label>
                        <input type="radio" name="purpose" value="suggestion">
                        Website Suggestion
                    </label>
                </fieldset>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Type here"></textarea>

                <label class="subscribe">
                    <input type="checkbox" name="subscribe">
                    Please Subscribe me to the monthly newsletter
                </label>

                <button type="submit">Get in Touch</button>

            </form>
        </section>

        <!-- EMPLOYEE PROFILES -->
        <section class="employees">
            <h2>We Are Here to Serve You</h2>

            <div class="employee-grid">
                <figure>
                    <img src="images/employee1.jpg" alt="Employee 1">
                    <figcaption>John Doe - Operations Manager</figcaption>
                </figure>

                <figure>
                    <img src="images/employee2.jpg" alt="Employee 2">
                    <figcaption>Jane Smith - Customer Support Lead</figcaption>
                </figure>

                <figure>
                    <img src="images/employee3.jpg" alt="Employee 3">
                    <figcaption>Mark Johnson - Trip Coordinator</figcaption>
                </figure>
            </div>
        </section>

    </main>

    <!-- FOOTER (reuse across all pages) -->
    <footer>
        <p>©️2026 BlueIn Rafting Okoro Ikechi Emmanuel</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook_220200.png" alt="Facebook Icon">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin_3991775.png" alt="LinkedIn Icon">
            </a>
            <a href="https://instagram.com">
                <img src="images/social_15707749.png" alt="Instagram Icon">
            </a>
        </nav>
    </footer>
</body>

</html>
